<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1424"/>
      <stop offset="100%" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded tile -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Cyan border ring -->
  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="12.75" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5"/>

  <!-- HUD corner brackets -->
  <g fill="#22d3ee" opacity="0.55">
    <path d="M 7 13 L 7 7 L 13 7 L 13 8.5 L 8.5 8.5 L 8.5 13 Z"/>
    <path d="M 51 7 L 57 7 L 57 13 L 55.5 13 L 55.5 8.5 L 51 8.5 Z"/>
    <path d="M 7 51 L 8.5 51 L 8.5 55.5 L 13 55.5 L 13 57 L 7 57 Z"/>
    <path d="M 51 55.5 L 55.5 55.5 L 55.5 51 L 57 51 L 57 57 L 51 57 Z"/>
  </g>

  <!-- Subtle grid -->
  <g stroke="#22d3ee" stroke-width="0.4" opacity="0.08">
    <line x1="6" y1="22" x2="58" y2="22"/>
    <line x1="6" y1="42" x2="58" y2="42"/>
  </g>

  <!-- "4" — geometric block, white with glow -->
  <g fill="#f1f5f9" filter="url(#softGlow)">
    <rect x="14" y="17" width="5" height="20"/>
    <rect x="14" y="32" width="15" height="5"/>
    <rect x="24" y="17" width="5" height="31"/>
  </g>

  <!-- "1" — geometric block, cyan accent with glow -->
  <g fill="url(#cyanGrad)" filter="url(#softGlow)">
    <polygon points="33,21 38,17 38,25"/>
    <rect x="38" y="17" width="5" height="31"/>
    <rect x="33" y="43" width="15" height="5"/>
  </g>

  <!-- Status indicator dot -->
  <circle cx="50.5" cy="13.5" r="1.6" fill="#22d3ee">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
